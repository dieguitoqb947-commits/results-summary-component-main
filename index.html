<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="./style.css" />
    <title>Results summary component</title>
  </head>
  <body>
    <div class="container">
      <aside class="container__asideleft">
        <h1 class="container__asideleft-title">Your Result</h1>
        <div class="container__asideleft-circle">
          <p><span class="container__asideleft-score">76</span> of 100</p>
        </div>
        <h2 class="container__asideleft-subtitle">Great</h2>
        <p>
          You scored higher than 65% of the people who have taken these tests.
        </p>
      </aside>
      <aside class="container__asideright">
        <h2 class="container__asideright-title">Summary</h2>
        <ul class="container__asideright-list">
          <li class="container__asideright-item">Reaction 80 / 100</li>
          <li class="container__asideright-item">Memory 92 / 100</li>
          <li class="container__asideright-item">Verbal 61 / 100</li>
          <li class="container__asideright-item">Visual 72 / 100</li>
        </ul>
        <button class="container__asideright-button">Continue</button>
      </aside>
    </div>

    <div class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
        >Frontend Mentor</a
      >. Coded by <a href="#">Your Name Here</a>.
    </div>
  </body>
</html>
