<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="./style.css" />
    <title>Results summary component</title>
  </head>
  <body>
    <div class="container">
      <aside class="container__asideleft">
        <h1 class="container__asideleft-title">Your Result</h1>
        <div class="container__asideleft-circle">
          <p><span class="container__asideleft-score">76</span> of 100</p>
        </div>
        <h2 class="container__asideleft-subtitle">Great</h2>
        <p>
          You scored higher than 65% of <br />the people who have taken<br />
          these tests.
        </p>
      </aside>
      <aside class="container__asideright">
        <h2 class="container__asideright-title">Summary</h2>
        <ul class="container__aside-list">
          <li class="container__aside-item container__item-1">
            <img src="./assets/images/icon-reaction.svg" />Reaction
            <span><strong>80</strong> / 100</span>
          </li>
          <li class="container__aside-item container__item-2">
            <img src="./assets/images/icon-memory.svg" />Memory
            <span><strong>92</strong> / 100</span>
          </li>
          <li class="container__aside-item container__item-3">
            <img src="./assets/images/icon-verbal.svg" /> Verbal
            <span><strong>61</strong> / 100</span>
          </li>
          <li class="container__aside-item container__item-4">
            <img src="assets/images/icon-visual.svg" />Visual
            <span><strong>72</strong> / 100</span>
          </li>
        </ul>
        <button class="container__aside-button">Continue</button>
      </aside>
    </div>

    <div class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
        >Frontend Mentor</a
      >. Coded by <a href="#">Your Name Here</a>.
    </div>
  </body>
</html>
